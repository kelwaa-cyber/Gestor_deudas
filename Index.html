<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Gestor de Deudas</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:linear-gradient(135deg,#667eea_0%,#764ba2_100%);min-height:100vh;padding:10px;color:#333}.container{max-width:100%;background:white;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,.1);overflow:hidden}h1{background:linear-gradient(135deg,#667eea,#764ba2);color:white;text-align:center;padding:25px;margin:0;font-size:24px}.form-section{padding:25px;background:#f8f9ff;border-bottom:1px solid #eee}.form-section h2{color:#333;margin-bottom:15px;font-size:18px}#debtForm{display:grid;gap:12px}#debtForm input,#debtForm textarea{padding:15px;border:2px solid #e1e5e9;border-radius:10px;font-size:16px;transition:border-color .3s}#debtForm input:focus,#debtForm textarea:focus{outline:none;border-color:#667eea}#debtForm button{padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;transition:transform .2s}#debtForm button:active{transform:scale(.98)}.summary{display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:20px;background:#f0f4ff}.summary h3{color:#333;font-size:18px;text-align:center;margin:0}.total-debt,.debt-count{padding:10px;background:white;border-radius:10px}.debts-section{padding:25px}.debts-section h2{color:#333;margin-bottom:20px;font-size:20px}.debt-item{background:white;border:2px solid #e1e5e9;border-radius:15px;padding:20px;margin-bottom:15px;transition:all .3s}.debt-item:active{transform:scale(.98)}.debt-info h3{color:#333;margin-bottom:5px;font-size:18px}.debt-info p{color:#666;margin-bottom:5px;font-size:14px}.amount{font-size:22px;font-weight:bold;color:#e74c3c}.due-soon{border-color:#f39c12;background:#fff3cd}.overdue{border-color:#e74c3c;background:#f8d7da}.paid{opacity:.6;background:#d4edda;border-color:#28a745}.btn{padding:10px 15px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:14px;margin:2px;transition:all .3s}.btn-pay{background:#28a2b8;color:white}.btn-pay:active{background:#218838}.btn-delete{background:#dc3545;color:white}.btn-delete:active{background:#c82333}.btn-backup{background:#17a2b8;color:white}.btn-backup:active{background:#138496}.btn-container{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;width:100%;margin-top:10px}@media(max-width:768px){.summary{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Gestor de Deudas</h1>
        
        <div class="form-section">
            <h2>➕ Nueva Deuda</h2>
            <form id="debtForm">
                <input type="text" id="creditor" placeholder="A quién le debo" required>
                <input type="number" id="amount" placeholder="Monto ($)" step="0.01" required>
                <input type="text" id="dueDate" placeholder="dd/mm/yyyy" required>
                <textarea id="description" placeholder="Descripción"></textarea>
                <button type="submit">Agregar</button>
            </form>
        </div>

        <div class="summary">
            <div class="total-debt">
                <h3>Total: $<span id="totalAmount">0</span></h3>
            </div>
            <div class="debt-count">
                <h3>Activas: <span id="activeDebts">0</span></h3>
            </div>
        </div>

        <div class="debts-section">
            <h2>📋 Mis Deudas</h2>
            <div id="debtsList"></div>
            
            <button onclick="debtManager.exportData()" class="btn btn-backup" style="width:100%;padding:15px;margin-top:20px;border-radius:10px;font-size:16px">💾 Exportar Backup</button>
            <button onclick="debtManager.importData()" class="btn btn-backup" style="width:100%;padding:15px;border-radius:10px;font-size:16px">📥 Importar Backup</button>
        </div>
    </div>

    <script>
        class DebtManager{
            constructor(){this.debts=JSON.parse(localStorage.getItem('debts'))||[];this.init()}
            init(){this.renderDebts();this.updateSummary();document.getElementById('debtForm').addEventListener('submit',e=>{e.preventDefault();this.addDebt()})}
            addDebt(){const creditor=document.getElementById('creditor').value;const amount=parseFloat(document.getElementById('amount').value);const dueDateText=document.getElementById('dueDate').value;const[day,month,year]=dueDateText.split('/').map(Number);const dueDate=new Date(year,month-1,day).toISOString().split('T')[0];const description=document.getElementById('description').value;const debt={id:Date.now(),creditor,amount,dueDate,description,paid:false,createdAt:new Date().toISOString()};this.debts.unshift(debt);this.saveDebts();this.renderDebts();this.updateSummary();this.clearForm()}
            markAsPaid(id){const debt=this.debts.find(d=>d.id===id);if(debt){debt.paid=!debt.paid;this.saveDebts();this.renderDebts();this.updateSummary()}}
            deleteDebt(id){if(confirm('¿Eliminar deuda?')){this.debts=this.debts.filter(d=>d.id!==id);this.saveDebts();this.renderDebts();this.updateSummary()}}
            exportData(){const dataStr=JSON.stringify(this.debts,null,2);const dataBlob=new Blob([dataStr],{type:'application/json'});const url=URL.createObjectURL(dataBlob);const link=document.createElement('a');link.href=url;link.download='mis_deudas_backup.json';link.click();URL.revokeObjectURL(url);alert('✅ Backup descargado')}
            importData(){const input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=e=>{const file=e.target.files[0];const reader=new FileReader();reader.onload=e=>{try{this.debts=JSON.parse(e.target.result);this.saveDebts();this.renderDebts();this.updateSummary();alert('✅ Datos importados!')}catch{alert('❌ Error en archivo')}};reader.readAsText(file)};input.click()}
            saveDebts(){localStorage.setItem('debts',JSON.stringify(this.debts))}
            isOverdue(debt){const dueDate=new Date(debt.dueDate);return new Date()>dueDate&&!debt.paid}
            isDueSoon(debt){const dueDate=new Date(debt.dueDate);const now=new Date();const diffTime=dueDate-now;const diffDays=Math.ceil(diffTime/(1000*60*60*24));return diffDays<=3&&diffDays>0&&!debt.paid}
            renderDebts(){const container=document.getElementById('debtsList');if(this.debts.length===0){container.innerHTML='<p style="text-align:center;color:#666;font-style:italic">¡Sin deudas! 🎉</p>';return}container.innerHTML=this.debts.map(debt=>{const isOverdue=this.isOverdue(debt);const isDueSoon=this.isDueSoon(debt);const className=debt.paid?'paid':isOverdue?'overdue':isDueSoon?'due-soon':'';const dueDate=new Date(debt.dueDate).toLocaleDateString('es-ES');const createdDate=new Date(debt.createdAt).toLocaleDateString('es-ES');return`<div class="debt-item ${className}"><div class="debt-info"><h3>${debt.creditor}</h3><p><strong>$${debt.amount.toLocaleString('es-ES',{minimumFractionDigits:2})}</strong></p><p><strong>Vence:</strong> ${dueDate} ${isOverdue?'❌ VENCIDA':isDueSoon?'⚠️ PRONTO':''}</p>${debt.description?'<p><em>'+debt.description+'</em></p>':''}<p style="font-size:12px;color:#888">Creada: ${createdDate}</p></div><div class="btn-container"><span class="amount">$${debt.amount.toLocaleString()}</span><br><button class="btn ${debt.paid?'btn-delete':'btn-pay'}" onclick="debtManager.markAsPaid(${debt.id})">${debt.paid?'Desmarcar':'Pagar'}</button><button class="btn btn-delete" onclick="debtManager.deleteDebt(${debt.id})">🗑️</button></div></div>`}).join('')}
            updateSummary(){const activeDebts=this.debts.filter(d=>!d.paid);const totalAmount=activeDebts.reduce((sum,debt)=>sum+debt.amount,0);document.getElementById('totalAmount').textContent=totalAmount.toLocaleString('es-ES',{minimumFractionDigits:2});document.getElementById('activeDebts').textContent=activeDebts.length}
            clearForm(){document.getElementById('debtForm').reset();document.getElementById('dueDate').value=''}
        }
        const debtManager=new DebtManager();
    </script>
</body>
</html>
