<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Deudas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💰 Gestor de Deudas</h1>
        
        <!-- Formulario para agregar deuda -->
        <div class="form-section">
            <h2>Agregar Nueva Deuda</h2>
            <form id="debtForm">
                <input type="text" id="creditor" placeholder="A quién le debo (ej: Juan, Banco)" required>
                <input type="number" id="amount" placeholder="Monto ($)" step="0.01" required>
                <input type="date" id="dueDate" required>
                <textarea id="description" placeholder="Descripción (opcional)"></textarea>
                <button type="submit">Agregar Deuda</button>
            </form>
        </div>

        <!-- Resumen -->
        <div class="summary">
            <div class="total-debt">
                <h3>Total Deudas: $<span id="totalAmount">0</span></h3>
            </div>
            <div class="debt-count">
                <h3>Deudas Activas: <span id="activeDebts">0</span></h3>
            </div>
        </div>

        <!-- Lista de deudas -->
        <div class="debts-section">
            <h2>📋 Mis Deudas</h2>
            <div id="debtsList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
